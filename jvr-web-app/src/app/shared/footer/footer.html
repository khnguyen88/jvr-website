<footer class="site-footer" [class.footer--section-active]="sectionActive()">
  <div class="footer-inner">

    <!-- Top grid -->
    <div class="footer-grid">

      <!-- Brand column -->
      <div class="footer-brand-col">
        <button type="button" class="footer-logo-btn" (click)="smoothScroll.scrollTo('hero')" aria-label="Back to top">
          <span class="footer-logo-name">JvR Enterprises</span>
          <span class="footer-logo-sub">LLC &middot; Software Consulting</span>
        </button>
        <p class="footer-brand-desc">
          Full-stack software consulting based in Grand Rapids, MI — serving enterprise clients
          across the Midwest and beyond.
        </p>
      </div>

      <!-- Services column -->
      <nav aria-label="Services links" class="footer-nav-col">
        <h5 class="footer-col-heading">Services</h5>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('services')">Full-Stack Development</button>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('services')">Cloud Architecture</button>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('services')">ETL &amp; Data Pipelines</button>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('services')">Automated Testing &amp; QA</button>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('services')">AI Workflow Integration</button>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('services')">Team Augmentation</button>
      </nav>

      <!-- Company column -->
      <nav aria-label="Company links" class="footer-nav-col">
        <h5 class="footer-col-heading">Company</h5>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('hero')">Home</button>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('why-us')">Why JvR</button>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('case-studies')">Case Studies</button>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('about')">About JvR</button>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('about')">Our Team</button>
      </nav>

      <!-- Contact column -->
      <nav aria-label="Contact links" class="footer-nav-col">
        <h5 class="footer-col-heading">Contact</h5>
        <button type="button" class="footer-link" (click)="smoothScroll.scrollTo('contact')">Start a Conversation</button>
        <a href="mailto:info@jvrcomputing.com" class="footer-link">Email Us</a>
      </nav>

    </div>

    <!-- Bottom bar -->
    <div class="footer-bottom">
      <span class="footer-legal">&copy; {{ year }} JvR Enterprises LLC. All rights reserved.</span>
      <span class="footer-legal">
        <a href="https://maps.google.com/?q=15+Ionia+SW+Suite+410+Grand+Rapids+MI+49503"
           target="_blank" rel="noopener"
           aria-label="Office address (opens in new tab)"
           class="footer-bottom-link">15 Ionia SW, Suite 410, Grand Rapids, MI 49503</a>
        &middot;
        <a href="mailto:info@jvrcomputing.com" class="footer-bottom-link">info&#64;jvrcomputing.com</a>
      </span>
    </div>

  </div>
</footer>

<div class="footer-accent-bar"></div>
