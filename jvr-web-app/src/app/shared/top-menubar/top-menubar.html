<p-menubar [model]="items">

  <ng-template #start>
    <a routerLink="/" class="logo-link flex align-items-center gap-2 no-underline">
      <img src="logos/OIP.webp" alt="JvR Enterprises logo" class="logo-img" />
      <div class="flex flex-column">
        <span class="logo-name">JvR Enterprises</span>
        <span class="logo-tagline">LLC</span>
      </div>
    </a>
  </ng-template>

  <ng-template #end>
    <div class="cta-btn-wrapper pr-3">
      <p-button label="Get Started" routerLink="/get-started" class="btn-orange" />
    </div>
  </ng-template>

</p-menubar>
