<section id="contact" class="cta-section">
  <div class="cta-inner text-center">

    <span class="section-label">Let's Talk</span>
    <h2 class="cta-heading">Let's Build Something<br /><em>Great Together</em></h2>
    <p class="cta-sub mx-auto mb-5">
      Ready to transform your enterprise? Tell us about your goals and we'll
      put together a tailored strategy—no obligation.
    </p>

    <div class="flex align-items-center justify-content-center gap-3 flex-wrap mb-5">
      <p-button
        label="Start a Conversation"
        [routerLink]="['/get-started']"
        class="btn-orange"
        size="large"
      />
      <p-button
        label="Contact Us →"
        [routerLink]="['/contact']"
        [outlined]="true"
        styleClass="cta-btn-ghost"
        size="large"
      />
    </div>

    <div class="cta-details flex align-items-center justify-content-center gap-5 flex-wrap">
      <span>📧 hello&#64;jvrenterprises.com</span>
      <span>📞 +1 (800) 555-0199</span>
      <span>📍 Grand Rapids, MI · New York, NY</span>
    </div>

  </div>
</section>
