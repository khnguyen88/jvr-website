<section id="process" class="process-section">
  <div class="section-inner">

    <app-section-header
      class="mb-7"
      label="How We Work"
      sub="Whether embedded in your team or owning the full initiative, we follow a consistent four-stage approach — iterative by nature and adaptive by design."
    >
      How We Get Things Done
    </app-section-header>

    <div class="grid">
      @for (step of steps; track step.num) {
        <div class="col-12 sm:col-6 lg:col-3">
          <div class="step-card text-center p-4">
            <div [class]="'step-num step-' + step.colorClass">{{ step.num }}</div>
            <h3 class="step-title">{{ step.title }}</h3>
            <p class="step-desc">{{ step.description }}</p>
          </div>
        </div>
      }
    </div>

  </div>
</section>
